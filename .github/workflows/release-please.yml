name: Release Please

on:
  push:
    branches:
      - main

jobs:
  release-please:
    runs-on: ubuntu-latest
    if: github.event.head_commit.message != contains('chore: bump version')
    
    steps:
      - name: Release Please
        id: release
        uses: google-github-actions/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: node
          package-name: waha-sdk
          
      # Optional: Custom release notes
      - name: Enhance Release Notes
        if: steps.release.outputs.release_created
        uses: actions/github-script@v7
        with:
          script: |
            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: '${{ steps.release.outputs.tag_name }}'
            });
            
            const enhancedBody = `${release.data.body}
            
            ## 📦 Installation
            \`\`\`bash
            npm install waha-sdk@${{ steps.release.outputs.version }}
            \`\`\`
            
            ## 🔗 Links
            - [NPM Package](https://www.npmjs.com/package/waha-sdk)
            - [Documentation](https://github.com/MajidRaimi/waha-sdk#readme)
            - [Issues](https://github.com/MajidRaimi/waha-sdk/issues)
            `;
            
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              body: enhancedBody
            });